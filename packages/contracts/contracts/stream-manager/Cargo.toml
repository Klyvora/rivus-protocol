[package]
name = "stream-manager"
version = "0.1.0"
edition = "2021"
description = "Rivus Protocol StreamManager — payment streaming for Soroban"
authors = ["mubking <https://github.com/mubking>"]
license = "MIT"
repository = "https://github.com/Klyvora/rivus-protocol"

[lib]
crate-type = ["cdylib"]
doctest = false

[features]
testutils = ["soroban-sdk/testutils"]

[dependencies]
soroban-sdk = { version = "22.0.0" }

[dev-dependencies]
soroban-sdk = { version = "22.0.0", features = ["testutils"] }

[profile.release]
opt-level = "z"
overflow-checks = true
debug = 0
strip = "symbols"
debug-assertions = false
panic = "abort"
codegen-units = 1
lto = true